<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movvi · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d18;--surface:#0f1623;--surface2:#161e2e;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--blue:#3b82f6;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 28px;flex-wrap:wrap;gap:14px}
.header img{height:48px;object-fit:contain}
.header-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800}
.header-sub{font-size:13px;color:var(--muted);margin-top:2px}
.wrap{max-width:1100px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.kpi-val{font-family:"Syne",sans-serif;font-size:30px;font-weight:800}
.kpi-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filters input,.filters select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--blue)}
.filters input{flex:1;min-width:180px}
.btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-blue{background:var(--blue);color:#fff}
.btn-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid rgba(30,41,59,.4);vertical-align:middle}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600}
.bok{background:#22c55e22;color:#86efac;border:1px solid #22c55e33}
.bnok{background:#f59e0b22;color:#fcd34d;border:1px solid #f59e0b33}
.pct-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle;margin-left:8px}
.pct-fill{height:100%;border-radius:99px}
.sbadge{font-size:12px;padding:5px 14px;border-radius:20px;display:inline-block;border:1px solid}
.s-ok{background:#22c55e15;color:#86efac;border-color:#22c55e33}
.s-err{background:#ef444415;color:#fca5a5;border-color:#ef444433}
.s-load{background:#3b82f615;color:#93c5fd;border-color:#3b82f633}
.empty{text-align:center;color:var(--muted);padding:48px;font-size:15px;line-height:2}
@media(max-width:600px){.pct-bar{display:none}td,th{padding:8px 6px}}
</style>
</head>

    <div>
      <div class="header-title">Dashboard de Resultados</div>
      <div class="header-sub">Testes TVDE · Movvi</div>
    </div>
  </div>
  <div class="btns">
    <span id="st" class="sbadge s-load">A ligar...</span>
    <button class="btn btn-gray" onclick="exportCSV()">⬇️ CSV</button>
    <button class="btn btn-blue" onclick="loadData()">🔄 Atualizar</button>
  </div>
</div>
<div class="wrap">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-val" id="k1" style="color:var(--blue)">—</div><div class="kpi-lbl">Testes realizados</div></div>
    <div class="kpi"><div class="kpi-val" id="k2" style="color:var(--purple)">—</div><div class="kpi-lbl">Motoristas únicos</div></div>
    <div class="kpi"><div class="kpi-val" id="k3" style="color:var(--green)">—</div><div class="kpi-lbl">Média geral</div></div>
    <div class="kpi"><div class="kpi-val" id="k4" style="color:var(--yellow)">—</div><div class="kpi-lbl">Taxa aprovação</div></div>
    <div class="kpi"><div class="kpi-val" id="k5" style="color:var(--cyan)">—</div><div class="kpi-lbl">Melhor resultado</div></div>
  </div>
  <div class="filters">
    <input type="text" id="fn" placeholder="🔍 Nome, ID ou matrícula..." oninput="doFilter()">
    <select id="fc" onchange="doFilter()"><option value="">Todas as cidades</option><option>Porto</option><option>Lisboa</option><option>Aveiro</option><option>Braga</option><option>Coimbra</option><option>Viseu</option><option>Viana do Castelo</option><option>Outra</option></select>
    <select id="fp" onchange="doFilter()"><option value="">Todas as plataformas</option><option>Uber</option><option>Bolt</option><option>Uber & Bolt</option></select>
    <select id="fr" onchange="doFilter()"><option value="">Todos</option><option value="ok">✅ Aprovados</option><option value="nok">⚠️ Reprovados</option></select>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-family:Syne,sans-serif;font-size:15px;font-weight:700;color:#94a3b8">Resultados individuais</span>
      <span id="cnt" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="tbl"><div class="empty">A ligar à base de dados...</div></div>
  </div>
</div>
<script>
var allData = [];

async function neonSQL(query, params) {
  var r = await fetch('/.netlify/functions/neon', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: query, params: params || []})
  });
  if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
  return r.json();
}

async function loadData() {
  var st = document.getElementById('st');
  st.className = 'sbadge s-load';
  st.textContent = 'A ligar...';
  document.getElementById('tbl').innerHTML = '<div class="empty">A carregar dados...</div>';
  try {
    var res = await neonSQL('SELECT * FROM quiz_resultados ORDER BY data_teste DESC');
    allData = res.rows || [];
    st.className = 'sbadge s-ok';
    st.textContent = '✅ Ligado · ' + allData.length + ' registos';
    kpis(); doFilter();
  } catch(e) {
    st.className = 'sbadge s-err';
    st.textContent = '❌ Erro';
    document.getElementById('tbl').innerHTML = '<div class="empty">❌ Erro ao ligar:<br><br><code style="font-size:11px;color:#fca5a5;word-break:break-all">' + e.message + '</code><br><br><button onclick="loadData()" style="margin-top:12px;padding:8px 20px;border-radius:8px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:inherit">🔄 Tentar novamente</button></div>';
    console.error(e);
  }
}

function kpis() {
  if (!allData.length) { ['k1','k2','k3','k4','k5'].forEach(function(i){document.getElementById(i).textContent='0';}); return; }
  var pcts = allData.map(function(r){return parseFloat(r.percentagem||0);});
  document.getElementById('k1').textContent = allData.length;
  document.getElementById('k2').textContent = new Set(allData.map(function(r){return(r.motorista_nome||'').toLowerCase();})).size;
  document.getElementById('k3').textContent = Math.round(pcts.reduce(function(a,b){return a+b;},0)/pcts.length)+'%';
  document.getElementById('k4').textContent = Math.round(pcts.filter(function(p){return p>=70;}).length/pcts.length*100)+'%';
  document.getElementById('k5').textContent = Math.max.apply(null,pcts)+'%';
}

function doFilter() {
  var n = document.getElementById('fn').value.toLowerCase();
  var c = document.getElementById('fc').value;
  var p = document.getElementById('fp').value;
  var r = document.getElementById('fr').value;
  var d = allData.filter(function(x) {
    if (n && !(x.motorista_nome||'').toLowerCase().includes(n) && !(x.motorista_id||'').toLowerCase().includes(n)) return false;
    if (c && x.cidade !== c) return false;
    if (p && x.plataforma !== p) return false;
    var pct = parseFloat(x.percentagem||0);
    if (r==='ok' && pct<70) return false;
    if (r==='nok' && pct>=70) return false;
    return true;
  });
  document.getElementById('cnt').textContent = d.length + ' resultado' + (d.length!==1?'s':'');
  render(d);
}

function render(data) {
  var t = document.getElementById('tbl');
  if (!data.length) { t.innerHTML = '<div class="empty">Nenhum resultado encontrado.</div>'; return; }
  var rows = data.map(function(r) {
    var p = parseFloat(r.percentagem||0), ok = p>=70;
    var col = p>=80?'var(--green)':p>=60?'var(--yellow)':'var(--red)';
    var dt = r.data_teste ? new Date(r.data_teste).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    return '<tr><td><strong>'+(r.motorista_nome||'—')+'</strong></td><td style="color:var(--muted)">'+(r.motorista_id||'—')+'</td><td style="color:var(--muted)">'+(r.telefone||'—')+'</td><td style="color:var(--muted)">'+(r.cidade||'—')+'</td><td style="color:var(--muted)">'+(r.plataforma||'—')+'</td><td><strong style="color:'+col+'">'+p+'%</strong><div class="pct-bar"><div class="pct-fill" style="width:'+p+'%;background:'+col+'"></div></div></td><td style="color:var(--muted)">'+(r.pontuacao||0)+'/'+(r.total_perguntas||30)+'</td><td><span class="badge '+(ok?'bok':'bnok')+'">'+(ok?'✅ Aprovado':'⚠️ Reprovado')+'</span></td><td style="color:var(--muted);font-size:11px">'+dt+'</td></tr>';
  }).join('');
  t.innerHTML = '<div style="overflow-x:auto"><table><thead><tr><th>Nome</th><th>ID</th><th>Telefone</th><th>Cidade</th><th>Plataforma</th><th>Resultado</th><th>Pontos</th><th>Estado</th><th>Data</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function exportCSV() {
  if (!allData.length) { alert('Sem dados.'); return; }
  var h = ['Nome','ID','Telefone','Cidade','Plataforma','Percentagem','Pontuacao','Total','Data'];
  var rows = allData.map(function(r){return[r.motorista_nome,r.motorista_id,r.telefone,r.cidade,r.plataforma,r.percentagem,r.pontuacao,r.total_perguntas,r.data_teste?new Date(r.data_teste).toLocaleString('pt-PT'):''].map(function(v){return'"'+(v||'').toString().replace(/"/g,'""')+'"';}).join(',');});
  var csv = [h.join(',')].concat(rows).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = 'movvi_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

loadData();
</script>
</body>
